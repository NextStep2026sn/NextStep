<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextStep - Orientation académique</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="onboarding">
        <!-- Logo + Titre -->
        <div class="logo-section">
            <div class="logo-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <path d="M3.27 6.96L12 12.01l8.73-5.05"></path>
                    <path d="M12 22.08V12"></path>
                </svg>
            </div>
            <h1>NextStep</h1>
            <p class="subtitle">Ton avenir commence ici ✨</p>
        </div>

        <!-- Image route qui se sépare -->
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=500&h=300&fit=crop" alt="Route qui se sépare">
        </div>

        <!-- Texte + Features + Bouton -->
        <div class="content-section">
            <h2>Trouve la voie qui te correspond</h2>
            <p class="description">Passe un test intelligent basé sur le modèle RIASEC et découvre les carrières les plus adaptées à ton profil.</p>

            <div class="features">
                <div class="feature">
                    <div class="icon icon-blue">✨</div>
                    <span>Test personnalisé</span>
                </div>
                <div class="feature">
                    <div class="icon icon-orange">🎯</div>
                    <span>100+ carrières</span>
                </div>
                <div class="feature">
                    <div class="icon icon-green">💼</div>
                    <span>Coaching pro</span>
                </div>
            </div>

            <button class="btn-primary">Commencer le test</button>
            <a href="#" class="link-secondary">J'ai déjà un compte</a>
        </div>
    </main>
</body>
</html>
